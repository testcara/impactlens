name: CI

on:
  # Run only on PRs to master
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect code vs docs/config changes
        id: change_check
        run: |
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} || true)
          echo "Changed files: $FILES"

          # Check if test configs changed (always run tests for test config changes)
          TEST_CONFIG=$(echo "$FILES" | grep -E '^config/test-(integration|aggregation|one-single-period)-ci/.*\.(ya?ml)$' || true)
          # Check if user configs changed (skip tests)
          USER_CONFIG=$(echo "$FILES" | grep -E '^config/.*\.(ya?ml)$' | grep -v -E '^config/test-' | grep -v -E '\.example$' || true)
          # Check if actual code files changed (not just docs/examples)
          CODE_FILES=$(echo "$FILES" | grep -vE '^(README\.md|docs/.*|config/.*\.example|LICENSE|\.gitignore|config/.*\.(ya?ml)$)' || true)

          if [ -n "$TEST_CONFIG" ]; then
            echo "code_changed=true" >> $GITHUB_OUTPUT
            echo "✅ Test config changed - running tests"
          elif [ -z "$CODE_FILES" ]; then
            echo "code_changed=false" >> $GITHUB_OUTPUT
            if [ -n "$USER_CONFIG" ]; then
              echo "✅ User config-only PR - skipping CI tests"
            else
              echo "✅ Docs-only PR - skipping CI tests"
            fi
          else
            echo "code_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Skip CI if only docs/config changed
        if: steps.change_check.outputs.code_changed == 'false'
        run: |
          echo "⏭️ Skipping tests - only docs or config files changed"
          exit 0

      - name: Set up Python ${{ matrix.python-version }}
        if: steps.change_check.outputs.code_changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        if: steps.change_check.outputs.code_changed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install tox tox-gh-actions

      - name: Run tests via tox
        if: steps.change_check.outputs.code_changed == 'true'
        run: |
          echo "=========================================="
          echo "Running tests on Python ${{ matrix.python-version }}"
          echo "=========================================="
          tox -e py$(echo "${{ matrix.python-version }}" | tr -d '.')

      - name: Run lint (Python 3.11 only)
        if: steps.change_check.outputs.code_changed == 'true' && matrix.python-version == '3.11'
        run: tox -e lint

      - name: Run type checking (Python 3.11 only)
        if: steps.change_check.outputs.code_changed == 'true' && matrix.python-version == '3.11'
        continue-on-error: true
        run: tox -e type

      - name: Skip lint/type for other Python versions
        if: steps.change_check.outputs.code_changed == 'true' && matrix.python-version != '3.11'
        run: echo "⏭️ Skipping lint/type for Python ${{ matrix.python-version }}"

  integration-tests:
    name: Integration Test - ${{ matrix.test-name }}
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      issues: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - test-name: "Basic"
            config-dir: "test-simple-team"
            reports-dir: "test-simple-team"
            command: "full --config config/test-simple-team"
            extra-args: "--incremental"
            cache-enabled: true
            pr-comment: true
          - test-name: "Multi-Team Aggregation"
            config-dir: "test-aggregation-ci"
            reports-dir: "test-ci-aggregated"
            command: "full --config config/test-aggregation-ci"
            extra-args: ""
            cache-enabled: false
            pr-comment: false
          - test-name: "Single Period (Jira)"
            config-dir: "test-one-single-period-jira"
            reports-dir: "test-single-period-jira"
            command: "jira full --config config/test-one-single-period-jira/jira_report_config.yaml"
            extra-args: ""
            cache-enabled: false
            pr-comment: false
          - test-name: "Single Period (PR)"
            config-dir: "test-one-single-period-pr"
            reports-dir: "test-single-period-pr"
            command: "pr full --config config/test-one-single-period-pr/pr_report_config.yaml"
            extra-args: "--incremental"
            cache-enabled: false
            pr-comment: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if integration test should run
        id: change_check
        run: |
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} || true)
          CONFIG_DIR="${{ matrix.config-dir }}"
          TEST_CONFIG=$(echo "$FILES" | grep -E "^config/${CONFIG_DIR}/.*\.(ya?ml)$" || true)
          CODE_CHANGED=$(echo "$FILES" | grep -qvE '^(README\.md|docs/.*|config/.*\.example|LICENSE|\.gitignore|config/[^/]+/.*\.(ya?ml)$)' && echo "true" || echo "false")

          if [ -n "$TEST_CONFIG" ] || [ "$CODE_CHANGED" = "true" ]; then
            echo "code_changed=true" >> $GITHUB_OUTPUT
          else
            echo "code_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip test if no relevant changes
        if: steps.change_check.outputs.code_changed == 'false'
        run: echo "⏭️ Skipping integration test - only docs/user configs changed"

      - name: Setup Python & dependencies
        if: steps.change_check.outputs.code_changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        if: steps.change_check.outputs.code_changed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Setup credentials
        if: steps.change_check.outputs.code_changed == 'true'
        env:
          GOOGLE_CREDENTIALS_BASE64: ${{ secrets.GOOGLE_CREDENTIALS_BASE64 }}
        run: bash .github/scripts/setup-google-credentials.sh

      - name: Restore cache
        if: steps.change_check.outputs.code_changed == 'true' && matrix.cache-enabled
        uses: actions/cache@v4
        with:
          path: .cache/github
          key: integration-${{ matrix.config-dir }}-cache-${{ hashFiles('config/${{ matrix.config-dir }}/**/*.yaml') }}-${{ github.run_id }}
          restore-keys: |
            integration-${{ matrix.config-dir }}-cache-

      - name: Clear cache if disabled
        if: steps.change_check.outputs.code_changed == 'true' && !matrix.cache-enabled
        run: rm -rf .cache/github/

      - name: Run integration test
        if: steps.change_check.outputs.code_changed == 'true'
        env:
          JIRA_USERNAME: ${{ secrets.JIRA_USERNAME }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHARTS_UPLOAD_TOKEN: ${{ secrets.CHARTS_UPLOAD_TOKEN }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.TEST_CI_GOOGLE_SPREADSHEET_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SMTP_USER: ${{ secrets.MAIL_APP_USER }}
          SMTP_PASSWORD: ${{ secrets.MAIL_APP_PASSWORD }}
          GITHUB_PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          echo "=========================================="
          echo "Running ${{ matrix.test-name }} integration test"
          echo "=========================================="

          UPLOAD_ARGS=$(.github/scripts/get-upload-args.sh)
          python -m impactlens.cli ${{ matrix.command }} $UPLOAD_ARGS ${{ matrix.extra-args }} \
            --hide-individual-names \
            --mail-save-file reports/${{ matrix.reports-dir }}/emails

      - name: Upload reports
        if: steps.change_check.outputs.code_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: integration-${{ matrix.config-dir }}-reports
          path: reports/
          retention-days: 7

      - name: PR Comment
        if: steps.change_check.outputs.code_changed == 'true' && matrix.pr-comment
        uses: ./.github/actions/report-comment
        with:
          reports_dir: reports/${{ matrix.reports-dir }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test summary
        if: steps.change_check.outputs.code_changed == 'true'
        run: |
          echo "=========================================="
          echo "${{ matrix.test-name }} Test Summary"
          echo "=========================================="
          echo "Config: config/${{ matrix.config-dir }}/"
          echo "Reports: reports/${{ matrix.reports-dir }}/"
